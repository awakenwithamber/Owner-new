<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>The Living Grimoire — Preview | Amber's Alchemy Apothecary</title>
<meta name="description" content="Preview the Living Grimoire — an ancient book of herbal wisdom, rituals, and botanical magic. Subscribe for $7.77/month to unlock the full grimoire." />
<link rel="icon" type="image/svg+xml" href="/images/icon-192.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=EB+Garamond:ital@0;1&family=Tangerine:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --leather-1:#3a2416; --leather-2:#241309; --leather-edge:#0f0805;
    --gold:#c9a84c; --gold-light:#e8cc80;
    --parch-1:#f3e7c9; --parch-2:#e7d3a8; --ink:#43321c; --ink-soft:#6b5333;
    --purple:#2a1640;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(61,26,92,.45), transparent 60%),
      radial-gradient(ellipse at 50% 100%, rgba(13,42,26,.3), transparent 55%),
      #0c0814;
    font-family:'EB Garamond',Georgia,serif; color:var(--parch-1); padding:18px; overflow:hidden;
  }
  .title-band{text-align:center;margin-bottom:14px}
  .title-band .sub{font-family:'EB Garamond',serif;letter-spacing:.3em;text-transform:uppercase;font-size:11px;color:var(--gold)}
  .title-band .main{font-family:'Cinzel Decorative',serif;color:var(--gold-light);font-size:clamp(1.1rem,4vw,1.5rem);margin-top:4px;text-shadow:0 0 26px rgba(201,168,76,.4)}

  /* ── BOOK ── */
  .book-wrap{position:relative;width:min(92vw,440px);}
  .book{
    position:relative; width:100%; aspect-ratio:3/4; perspective:1800px;
    border-radius:10px 16px 16px 10px;
    background:
      repeating-linear-gradient(115deg, rgba(0,0,0,.10) 0 3px, transparent 3px 7px),
      linear-gradient(135deg,var(--leather-1),var(--leather-2) 60%,var(--leather-edge));
    box-shadow:0 30px 70px rgba(0,0,0,.6), inset 0 0 0 2px rgba(201,168,76,.18), inset 0 0 60px rgba(0,0,0,.5);
    padding:14px 14px 14px 22px;
  }
  .book::before{ /* spine */
    content:'';position:absolute;left:10px;top:8px;bottom:8px;width:8px;border-radius:4px;
    background:linear-gradient(90deg, rgba(0,0,0,.55), rgba(201,168,76,.15));
  }
  .page{
    position:relative; width:100%; height:100%; border-radius:4px 10px 10px 4px;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.35), transparent 50%),
      linear-gradient(160deg,var(--parch-1),var(--parch-2));
    box-shadow:inset 0 0 40px rgba(150,110,60,.28), inset 0 0 0 1px rgba(150,110,60,.25);
    color:var(--ink); padding:30px 26px; overflow:hidden;
    transform-origin:left center; transform-style:preserve-3d; backface-visibility:hidden;
    transition:transform .6s cubic-bezier(.4,.15,.2,1), opacity .3s;
  }
  .page.turn-next{transform:rotateY(-165deg);opacity:.2;}
  .page.turn-prev{transform:rotateY(165deg);opacity:.2;}
  .page-inner{height:100%;display:flex;flex-direction:column;}

  .pg-ornament{text-align:center;color:var(--gold);opacity:.7;letter-spacing:.4em;font-size:13px}
  .pg-title{font-family:'Cinzel Decorative',serif;color:#5a3d18;text-align:center;font-size:clamp(1.1rem,5vw,1.5rem);margin:8px 0 2px}
  .pg-script{font-family:'Tangerine',cursive;font-size:clamp(1.6rem,7vw,2.3rem);color:#7a5a28;text-align:center;line-height:1;margin-bottom:10px}
  .pg-rule{border:none;border-top:1px solid rgba(120,90,50,.4);width:60%;margin:10px auto 16px}
  .pg-body{font-size:clamp(.95rem,3.6vw,1.05rem);line-height:1.75;color:var(--ink-soft);overflow-y:auto;flex:1}
  .pg-body p{margin:0 0 12px}
  .toc-item,.idx-item{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dotted rgba(120,90,50,.35);font-size:1rem}
  .toc-item .dots{flex:1;border-bottom:1px dotted rgba(120,90,50,.5);margin:0 6px;transform:translateY(-5px)}
  .pg-handwritten{font-family:'Tangerine',cursive;font-size:1.5rem;color:#6b4f24;text-align:center;margin-top:8px}
  .pg-foot{text-align:center;font-size:12px;color:#8a6b3a;margin-top:8px}

  /* ── locked pages beyond preview ── */
  .page.locked .page-inner{filter:blur(6px);opacity:.55;}
  .lock-overlay{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;border-radius:4px 10px 10px 4px;z-index:5;
    background:linear-gradient(180deg, rgba(20,10,35,.4), rgba(20,10,35,.86));
    color:var(--parch-1);
  }
  .lock-overlay.show{display:flex;animation:fadein .4s ease}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  .lock-overlay .lk-icon{font-size:2.4rem;margin-bottom:8px}
  .lock-overlay h2{font-family:'Cinzel Decorative',serif;color:var(--gold-light);font-size:1.25rem;line-height:1.4;margin:0 0 8px}
  .lock-overlay p{font-style:italic;color:var(--parch-2);max-width:30ch;margin:0 0 18px}
  .subscribe-btn{
    display:inline-block;background:linear-gradient(135deg,#6e4ea1,#8c6bc0);border:1px solid var(--gold);
    color:#f4e8d0;text-decoration:none;padding:13px 28px;border-radius:28px;font-family:'Cinzel Decorative',serif;
    font-size:.95rem;cursor:pointer;transition:transform .15s, box-shadow .15s;
  }
  .subscribe-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(110,78,161,.55)}
  .lock-price{font-family:'Tangerine',cursive;font-size:2.4rem;color:var(--gold-light);margin-bottom:2px}

  /* ── controls ── */
  .controls{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:16px}
  .nav-btn{
    width:48px;height:48px;border-radius:50%;border:1px solid var(--gold);background:rgba(201,168,76,.1);
    color:var(--gold-light);font-size:1.4rem;cursor:pointer;display:grid;place-items:center;transition:.18s;
  }
  .nav-btn:hover{background:rgba(201,168,76,.22)}
  .nav-btn:disabled{opacity:.3;cursor:default}
  .page-num{font-family:'Cinzel Decorative',serif;color:var(--gold);min-width:90px;text-align:center;font-size:.85rem;letter-spacing:.05em}
  .hint{margin-top:10px;font-size:12px;color:rgba(201,168,76,.6);font-style:italic}
  a.home{position:fixed;top:14px;left:14px;color:var(--gold);text-decoration:none;font-size:.85rem;border:1px solid rgba(201,168,76,.3);padding:6px 12px;border-radius:18px}
</style>
</head>
<body>
  <a class="home" href="/">← Apothecary</a>
  <div class="title-band">
    <div class="sub">Amber's Alchemy Apothecary</div>
    <div class="main">The Living Grimoire</div>
  </div>

  <div class="book-wrap">
    <div class="book" id="book">
      <div class="page" id="page">
        <div class="page-inner" id="pageInner"></div>
      </div>
      <div class="lock-overlay" id="lockOverlay">
        <div class="lk-icon">🔒</div>
        <h2>The pages ahead hold ancient secrets…</h2>
        <p>Subscribe for $7.77/month to unlock the full grimoire.</p>
        <div class="lock-price">$7.77<span style="font-family:'EB Garamond',serif;font-size:.9rem"> / month</span></div>
        <a class="subscribe-btn" id="subscribeBtn" href="/checkout.html?mode=subscription">✦ Subscribe Now</a>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prevBtn" aria-label="Previous page">‹</button>
    <div class="page-num" id="pageNum"></div>
    <button class="nav-btn" id="nextBtn" aria-label="Next page">›</button>
  </div>
  <div class="hint">Swipe or use the arrows to turn the page</div>

<script>
/* Content as JSON — pages 0–8 are the free preview. Pages with locked:true blur + show the CTA. */
const PAGES = [
  { type:'toc',  title:'The Living Grimoire', script:'a book of remembered light', items:[
      ['I. The Seers & the Sacred Line','1'],['II. The Wheel of the Year','9'],
      ['III. Herbal Wisdom','21'],['IV. Rituals of Light','51'],['V. The Living Pages','71'] ] },
  { type:'toc',  title:'Table of Contents', items:[
      ['Opening Blessing','i'],['The Law of Light Magic','3'],['The Sacred Bath of Release','52'],
      ['Moon Milk for Deep Sleep','72'],['Dreamwork & Symbols','78'],['The Future Pages','86'] ] },
  { type:'index',title:'Index of Allies', items:[
      ['Chamomile','24'],['Lavender','25'],['Mugwort','26'],['Rosemary','23'],['Hibiscus','27'],['Nettle','31'] ] },
  { type:'index',title:'Index of Rituals', items:[
      ['Beauty Balm Blessing','64'],['Hibiscus Moon Tea','27'],['Home Blessing','55'],
      ['Ritual Bath','52'],['Sleep Sachet','25'],['Winter Solstice','9'] ] },
  { type:'text', title:'Opening Blessing', body:[
      'To the daughters who remember, to the sons who listen gently, to the healers who still hear the earth — this book was written for you.',
      'The world taught humanity to forget. This grimoire exists so that remembrance may begin again.'],
      hand:'Only restoration. Only remembrance. Only light.' },
  { type:'text', title:'Chapter I — The Law of Light Magic', body:[
      'The first law of this grimoire is simple: never intentionally use spiritual practice to harm another living being.',
      'Magic is not domination. Magic is relationship — with the self, with the earth, with consequence, with time, with spirit.'] },
  { type:'text', title:'Rosemary — Herb of Remembrance', body:[
      'Rosemary has long been tied to memory, clarity, and protection. Burned for purification, placed near doors to guard the threshold.'],
      hand:'What clouds my sight releases. My mind remembers clarity.' },
  { type:'text', title:'The Sacred Bath of Release', body:[
      'Fill the bath. Add sea salt, rosemary, lavender, chamomile, and rose petals. Sit quietly. Place your hands over your heart.'],
      hand:'I call my energy home. I soften. I heal.' },
  { type:'text', title:'Moon Milk for Deep Sleep', body:[
      'Warm oat milk with chamomile, lavender, cinnamon, honey, and a whisper of nutmeg. Steep slowly. Drink before bed beneath a quiet light.'],
      foot:'— the last page of the preview —' },
  // Pages beyond here are locked in preview mode:
  { type:'text', title:'The Protection Circle', locked:true, body:['Cast the circle with salt and intention…'] },
  { type:'text', title:'Seasonal Workings of Beltane', locked:true, body:['When the fires are lit…'] },
];

const PREVIEW_MAX = 8;       // last freely-viewable page index
let idx = 0, animating = false;

const pageEl   = document.getElementById('page');
const innerEl  = document.getElementById('pageInner');
const lockEl   = document.getElementById('lockOverlay');
const numEl    = document.getElementById('pageNum');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');

function pageHTML(p){
  const orn = '<div class="pg-ornament">✦ ⚯ ✦</div>';
  if(p.type==='toc' || p.type==='index'){
    const rows = (p.items||[]).map(function(it){
      return '<div class="'+(p.type==='toc'?'toc-item':'idx-item')+'"><span>'+it[0]+'</span><span class="dots"></span><span>'+it[1]+'</span></div>';
    }).join('');
    return orn + (p.script?'<div class="pg-script">'+p.script+'</div>':'') +
      '<div class="pg-title">'+p.title+'</div><hr class="pg-rule"><div class="pg-body">'+rows+'</div>';
  }
  const body = (p.body||[]).map(function(t){return '<p>'+t+'</p>';}).join('');
  return orn + '<div class="pg-title">'+p.title+'</div><hr class="pg-rule"><div class="pg-body">'+body+
    (p.hand?'<div class="pg-handwritten">'+p.hand+'</div>':'')+'</div>'+
    (p.foot?'<div class="pg-foot">'+p.foot+'</div>':'');
}

function render(){
  const p = PAGES[idx] || {};
  innerEl.innerHTML = pageHTML(p);
  const locked = !!p.locked || idx > PREVIEW_MAX;
  pageEl.classList.toggle('locked', locked);
  lockEl.classList.toggle('show', locked);
  numEl.textContent = 'Page ' + idx + (locked ? ' · locked' : '') ;
  prevBtn.disabled = idx === 0;
  // allow advancing up to PREVIEW_MAX+1 (which reveals the first locked page + overlay), then stop
  nextBtn.disabled = idx >= Math.min(PREVIEW_MAX + 1, PAGES.length - 1);
}

function turn(dir){
  if(animating) return;
  const target = idx + dir;
  if(target < 0 || target > Math.min(PREVIEW_MAX + 1, PAGES.length - 1)) return;
  animating = true;
  pageEl.classList.add(dir>0?'turn-next':'turn-prev');
  setTimeout(function(){
    idx = target; render();
    pageEl.classList.remove('turn-next','turn-prev');
    // snap the incoming page from the opposite side without transition
    const inClass = dir>0?'turn-prev':'turn-next';
    pageEl.style.transition='none'; pageEl.classList.add(inClass);
    requestAnimationFrame(function(){
      pageEl.style.transition=''; pageEl.classList.remove(inClass);
      animating=false;
    });
  }, 320);
}

prevBtn.addEventListener('click', function(){ turn(-1); });
nextBtn.addEventListener('click', function(){ turn(1); });
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowLeft') turn(-1);
  if(e.key==='ArrowRight') turn(1);
});

/* Touch / pointer swipe (Pointer Events API) */
let startX=null, startT=0;
pageEl.addEventListener('pointerdown', function(e){ startX=e.clientX; startT=Date.now(); });
pageEl.addEventListener('pointerup', function(e){
  if(startX===null) return;
  const dx=e.clientX-startX, dt=Date.now()-startT;
  if(Math.abs(dx)>45 && dt<800){ turn(dx<0?1:-1); }
  startX=null;
});

render();
</script>
</body>
</html>
